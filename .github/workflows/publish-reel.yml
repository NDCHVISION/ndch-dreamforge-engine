name: Generate & Publish Instagram Reel

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Voiceover script — spoken in your ElevenLabs voice'
        required: true
      video_prompt:
        description: 'Visual prompt for Runway Gen-4 (describe the scene/mood)'
        required: true
      caption:
        description: 'Instagram caption (max 2200 chars, include hashtags)'
        required: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tools
        run: |
          npm install -g tsx
          sudo apt-get install -y ffmpeg

      - name: Generate voiceover + video
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          RUNWAY_API_KEY:     ${{ secrets.RUNWAY_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          REEL_SCRIPT:        ${{ inputs.script }}
          REEL_PROMPT:        ${{ inputs.video_prompt }}
        run: npx tsx generate-reel.ts

      - name: Publish to Instagram
        env:
          INSTAGRAM_PAGE_TOKEN:   ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: "17841463257757058"
          META_APP_ID:            "1966454147334333"
          META_APP_SECRET:        ${{ secrets.META_APP_SECRET }}
          FB_PAGE_ID:             "782632291594234"
          REEL_VIDEO_URL:         ${{ env.REEL_VIDEO_URL }}
          REEL_CAPTION:           ${{ inputs.caption }}
        run: npx tsx publish-reel.ts
